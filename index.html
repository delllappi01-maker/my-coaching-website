<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Student Login - My Coaching</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
        .card { border: none; border-radius: 15px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">📚 MY COACHING</a>
            <span class="navbar-text text-white" id="nav-user-status">Guest Mode</span>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 500px;">
        
        <div class="card shadow p-4" id="login-card">
            <h3 class="fw-bold text-center mb-4 text-primary">Student Login</h3>
            
            <form id="mobile-form" onsubmit="sendOTP(event)">
                <div class="mb-3">
                    <label class="form-label fw-bold">Enter Mobile Number</label>
                    <div class="input-group">
                        <span class="input-group-text">+91</span>
                        <input type="tel" class="form-control" id="mobile-input" placeholder="9876543210" maxlength="10" required pattern="[0-9]{10}">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Send OTP</button>
            </form>

            <form id="otp-form" onsubmit="verifyOTP(event)" class="d-none">
                <div class="mb-3">
                    <label class="form-label fw-bold text-success" id="otp-message">OTP sent successfully!</label>
                    <input type="text" class="form-control text-center fw-bold fs-4" id="otp-input" placeholder="X X X X" maxlength="4" required>
                    <small class="text-muted d-block mt-1 text-center">Hint: Enter 1234 to login</small>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold mb-2">Verify & Login</button>
                <button type="button" class="btn btn-link w-100 btn-sm text-secondary" onclick="showMobileForm()">Change Mobile Number</button>
            </form>
        </div>

        <div class="card shadow p-4 bg-light text-center d-none" id="dashboard-card">
            <h3 class="fw-bold text-success mb-3">🎉 Welcome to Student Dashboard</h3>
            <p class="lead">You have successfully logged in via OTP!</p>
            
            <div class="border rounded p-3 bg-white text-start my-3">
                <h5><strong>Your Batches:</strong></h5>
                <ul>
                    <li>Target JEE / NEET 2026</li>
                    <li>Weekly Mock Test Series</li>
                </ul>
            </div>

            <button class="btn btn-danger fw-bold mt-3" onclick="logout()">Logout</button>
        </div>

    </div>

    <script>
        let savedMobile = "";

        function sendOTP(event) {
            event.preventDefault();
            const mobileInput = document.getElementById('mobile-input').value;
            if(mobileInput.length === 10) {
                savedMobile = mobileInput;
                document.getElementById('mobile-form').classList.add('d-none');
                document.getElementById('otp-form').classList.remove('d-none');
                document.getElementById('otp-message').innerText = `OTP sent to +91 ${savedMobile}`;
                alert(`Testing OTP sent! Use OTP: 1234`);
            }
        }

        function verifyOTP(event) {
            event.preventDefault();
            const otpInput = document.getElementById('otp-input').value;
            if(otpInput === '1234') {
                alert('Login Successful!');
                document.getElementById('login-card').classList.add('d-none');
                document.getElementById('dashboard-card').classList.remove('d-none');
                document.getElementById('nav-user-status').innerText = "Welcome, Student!";
            } else {
                alert('Wrong OTP! Please use 1234 for testing.');
            }
        }

        function showMobileForm() {
            document.getElementById('otp-form').classList.add('d-none');
            document.getElementById('mobile-form').classList.remove('d-none');
        }

        function logout() {
            document.getElementById('dashboard-card').classList.add('d-none');
            document.getElementById('login-card').classList.remove('d-none');
            showMobileForm();
            document.getElementById('mobile-input').value = "";
            document.getElementById('otp-input').value = "";
            document.getElementById('nav-user-status').innerText = "Guest Mode";
        }
    </script>
</body>
</html>
