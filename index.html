<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Zenith Academy - India's Smartest Learning Platform for Competitive Exams (JEE, NEET, UPSC, SSC, Banking, GATE)">
  
  <title>Zenith Academy | Smartest Learning Platform</title>
  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Vector Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- React 18, ReactDOM, and Babel Standalone CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="custom.css">
  <!-- Tailwind Theme Configurations -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          colors: {
            slate: {
              850: '#141c2f',
              900: '#0f172a',
              950: '#070a13',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#0b0f19] text-slate-200 antialiased selection:bg-indigo-500/30">
  <!-- React Application Mount Node -->
  <div id="root"></div>
  <!-- Preload static mock databases -->
  <script src="src/data/mockData.js"></script>
  <!-- Main React Application Script compiled dynamically in-browser via Babel -->
  <script type="text/babel" data-type="module">
    import { ZenithProvider, useZenith } from './src/store/state.js';
    import { ToastContainer } from './src/components/Common.js';
    
    // Components
    import Layout from './src/components/Layout.js';
    
    // Views
    import LandingPage from './src/views/LandingPage.js';
    import Auth from './src/views/Auth.js';
    import Dashboard from './src/views/Dashboard.js';
    import Courses from './src/views/Courses.js';
    import LiveClasses from './src/views/LiveClasses.js';
    import DoubtSolving from './src/views/DoubtSolving.js';
    import MockTests from './src/views/MockTests.js';
    import TeacherPanel from './src/views/TeacherPanel.js';
    import AdminPanel from './src/views/AdminPanel.js';
    import Community from './src/views/Community.js';
    import Payments from './src/views/Payments.js';
    import AISpace from './src/views/AISpace.js';
    const { useState, useEffect } = window.React;
    function ZenithApp() {
      const { user, role, toasts } = useZenith();
      const [view, setView] = useState('landing');
      // Sync active view with user session status
      useEffect(() => {
        if (!user && view !== 'landing') {
          setView('landing');
        }
      }, [user]);
      // Simple SPA Router switcher
      const renderActiveView = () => {
        switch (view) {
          case 'landing':
            return <LandingPage onViewChange={setView} />;
          case 'auth':
            return <Auth onViewChange={setView} />;
          
          // Student Dashboard links
          case 'dashboard':
            return <Dashboard onViewChange={setView} />;
          case 'courses':
            return <Courses onViewChange={setView} />;
          case 'live-classes':
            return <LiveClasses onViewChange={setView} />;
          case 'doubts':
            return <DoubtSolving />;
          case 'mock-tests':
            return <MockTests />;
          case 'ai-space':
            return <AISpace />;
          case 'community':
            return <Community />;
          case 'payments':
            return <Payments onViewChange={setView} />;
          // Teacher Dashboard links
          case 'teacher-dashboard':
          case 'teacher-courses':
          case 'teacher-live':
          case 'teacher-doubts':
            return <TeacherPanel />;
          // Admin Dashboard links
          case 'admin-dashboard':
          case 'admin-users':
          case 'admin-moderation':
          case 'admin-coupons':
            return <AdminPanel />;
            
          default:
            return <LandingPage onViewChange={setView} />;
        }
      };
      // Landing and Auth render outside the sidebar shell, while all internal dashboards render inside
      const isPublicView = view === 'landing' || view === 'auth';
      return (
        <div className="min-h-screen">
          {isPublicView ? (
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              {/* Header Navigation for external portals */}
              <header className="flex justify-between items-center py-4 border-b border-slate-900 mb-8 shrink-0">
                <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('landing')}>
                  <div className="w-9 h-9 rounded-xl bg-gradient-to-tr from-indigo-600 to-pink-500 flex items-center justify-center shadow-lg shadow-indigo-500/25">
                    <span className="text-white font-black text-xl italic font-heading">Z</span>
                  </div>
                  <div>
                    <h1 className="text-lg font-black font-heading text-white tracking-tight">Zenith Academy</h1>
                    <span className="text-[9px] text-indigo-400 font-bold uppercase tracking-widest block -mt-1">Preparations Portal</span>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  {user ? (
                    <button
                      onClick={() => setView(role === 'student' ? 'dashboard' : role === 'teacher' ? 'teacher-dashboard' : 'admin-dashboard')}
                      className="px-5 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs shadow-lg shadow-indigo-500/10 transition active:scale-95"
                    >
                      Go to Dashboard
                    </button>
                  ) : (
                    <button
                      onClick={() => setView('auth')}
                      className="px-5 py-2 rounded-xl bg-slate-800 hover:bg-slate-750 text-slate-200 font-bold text-xs border border-slate-700/80 transition active:scale-95"
                    >
                      Login / Sign Up
                    </button>
                  )}
                </div>
              </header>
              {renderActiveView()}
            </div>
          ) : (
            <Layout currentView={view} onViewChange={setView}>
              {renderActiveView()}
            </Layout>
          )}
          {/* Unified Alert Notifications overlay */}
          <ToastContainer toasts={toasts} />
        </div>
      );
    }
    // Bootstrap Root
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(
      <ZenithProvider>
        <ZenithApp />
      </ZenithProvider>
    );
  </script>
</body>
</html>
